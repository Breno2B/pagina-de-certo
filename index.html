<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer>
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
    }
  </style>
</head>

<body>
  <h1>Redirecionando, aguarde um momento... 🔄</h1>

  <script>
    setTimeout(function () {
      var shortCode = "bot-1ba53949";
      var endpoint = "https://gfakbrdvnfutznhyuvrv.supabase.co/functions/v1/track-external-click";

      var queryParams = {};
      var originalParams = window.location.search;

      new URLSearchParams(originalParams).forEach(function(value, key) {
        queryParams[key] = value;
      });

      fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          shortCode: shortCode,
          queryParams: queryParams,
          userAgent: navigator.userAgent,
          urlCompleto: originalParams.substring(1) || null
        })
      })
      .then(function(response) {
        return response.json();
      })
      .then(function(data) {
        if (data && data.redirectUrl) {
          var finalUrl = data.redirectUrl;

          if (originalParams) {
            finalUrl += finalUrl.includes("?")
              ? "&" + originalParams.substring(1)
              : originalParams;
          }

          window.location.href = finalUrl;
        } else {
          document.body.innerHTML = "<h1>Destino final não encontrado.</h1>";
        }
      })
      .catch(function() {
        document.body.innerHTML = "<h1>Erro no redirecionamento.</h1>";
      });

    }, 1000);
  </script>
</body>
</html>
