  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #087BFF;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #ffffff;
    }

    .box {
      padding: 30px;
      max-width: 420px;
      width: 100%;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.4;
      margin-bottom: 25px;
    }

    .loader {
      width: 46px;
      height: 46px;
      border: 4px solid rgba(255,255,255,0.35);
      border-top: 4px solid #fff;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
