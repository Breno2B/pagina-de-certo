<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Liberado</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: linear-gradient(180deg, #0b8cff 0%, #0066cc 100%);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
    }

    .box {
      width: 90%;
      max-width: 430px;
      padding: 35px 25px;
    }

    .icon {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: #fff;
      color: #0077e6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      margin: 0 auto 25px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 15px;
      font-weight: 800;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 12px;
      background: #ffffff;
      color: #0066cc;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .small {
      margin-top: 18px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
