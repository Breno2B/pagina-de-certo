<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificação Segura</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top, #dbeafe 0%, #93c5fd 35%, #3b82f6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #0f172a;
    }

    .card {
      width: 100%;
      max-width: 390px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 34px 28px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.25);
      border: 1px solid rgba(255,255,255,0.65);
    }

    .shield {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 30px;
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35);
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #2563eb;
      background: #dbeafe;
      padding: 7px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 10px;
      color: #0f172a;
    }

    p {
      margin: 0;
      font-size: 15px;
      color: #475569;
      line-height: 1.5;
    }

    .verify-box {
      margin-top: 26px;
      border: 1px solid #dbeafe;
      background: #f8fafc;
      border-radius: 16px;
      padding: 18px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
      user-select: none;
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: #2563eb;
    }

    .loading {
      margin-top: 18px;
      display: none;
      font-size: 14px;
      color: #2563eb;
      font-weight: 600;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid #bfdbfe;
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 14px auto 0;
      display: none;
    }

    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: #64748b;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

</head>
<body>

    <div class="shield">🔒</div>

      Para continuar, confirme que você é uma pessoa real.

        Verificando acesso...

    </div>

      Sua conexão está sendo validada com segurança.
    </div>
